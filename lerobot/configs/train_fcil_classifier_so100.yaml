# Set policy parameters
policy:
  dim_model: 1024
  n_heads: 2
  n_encoder_layers: 3
  dropout: 0.1
  max_seq_len: 1000
  state_dim: 6
  action_dim: 6
  use_embeddings: True
  embedding_dim: 1024
  normalization_mapping:
    STATE: MEAN_STD
    ACTION: MEAN_STD
    VISUAL: IDENTITY

# Set dataset repo IDs for classifier training
dataset_root: "/home/josh/phddev/lerobot"
success_dataset_repo_id: "outputs/success_50"
mixed_dataset_repo_id: "outputs/mixed_50"

# Standard training parameters
batch_size: 8
num_workers: 0
steps: 5000
log_freq: 10
use_embeddings: True
embedding_dim: 1024
save_freq: 50
seed: 42
output_dir: "outputs/train/fcil_classifier/so100_run1" 
eval_freq: 50
train_val_split_ratio: 0.8

# WandB (optional)
wandb:
  enable: true
  project: "fcil_robotics"